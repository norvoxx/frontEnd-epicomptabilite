  <body>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        var calendarEl = document.getElementById("calendar");

        var calendar = new FullCalendar.Calendar(calendarEl, {
          headerToolbar: {
            start: "dayGridMonth,timeGridWeek",
            center: "title",
            end: "prev,next",
            initialView: "dayGridMonth",
          },
          height: "100%",
          locale: "fr",

          editable: true,
          eventResizableFromStart: true,
          selectable: true,
          selectMirror: true,

          events: [
            {
              id: "1",
              title: "Déplaçable",
              start: "2026-02-10",
            },
            {
              id: "1",
              title: "Déplaçable",
              start: "2026-02-10",
              editable: false,
              durationEditable: false,
            },
            {
              id: "2",
              title: "Avec heure",
              start: "2026-02-12T09:00:00",
              end: "2026-02-12T11:00:00",
            },
          ],
          eventDrop: function (info) {
            alert(
              "Événement déplacé !\n" +
                "Ancienne date : " +
                info.oldEvent.startStr +
                "\n" +
                "Nouvelle date : " +
                info.event.startStr,
            );
          },
          eventResize: function (info) {
            alert("Durée modifiée !\n" + "Nouvelle fin : " + info.event.endStr);
          },
          eventClick: function (info) {
            alert("Événement cliqué : " + info.event.title);
          },

          dateClick: function (info) {
            alert("Date cliquée : " + info.dateStr);

            console.log(info);
          },
        });

        calendar.render();
      });
    </script>

    <section class="main-container">
      <main class="main-container">
        <section class="header-container">
          <header>
            <div class="header-search">
              <input type="text" placeholder="Recheche Action / taches ..." />

          </header>

        <section class="dashboard">
          <div class="box">
            <div class="calendar" id="calendar"></div>
            <button class="modal-btn modal-trigger">Open</button>
          </div>
        </section>
      </main>
      <div class="modal-container" id="modalContainer">
        <div class="overlay modal-trigger"></div>
        <div
          class="modal"
          role="dialog"
          aria-labelledby="modalTitle"
          aria-describedby="dialogDesc"
        >
          <button class="close-modal modal-trigger" aria-label="close modal">
            x
          </button>
          <h1 id="modalTitle">Ajouter une date</h1>
          <p id="dialogDesc">
            Sélectionnez une date à ajouter dans le calendrier.
          </p>

          <form id="calendarForm" class="calendarForm">
            <div class="calendar-form">
              <div class="form-left">
                <label for="dateInput">Titre de l'evenement :</label>
                <input type="text" placeholder="Nom de l'événement" />

                <label for="dateEndInput">Description :</label>

                <textarea name="" id=""></textarea>

                <label for="dateInput">Date :</label>
                <input type="date" id="dateInput" name="dateInput" required />

                <label for="dateInput">Heure :</label>
                <input type="time" id="dateInput" name="dateInput" required />

                <label for="dateEndInput">Jusqu'à :</label>
                <input
                  type="date"
                  id="dateEndInput"
                  name="dateEndInput"
                  required
                />
              </div>

              <div class="form-right">
                <label for="colorInput">Couleur :</label>
                <input
                  type="color"
                  id="colorInput"
                  name="colorInput"
                  value="#ff0000"
                />
              </div>
            </div>
            <button type="submit" class="submit-btn">Ajouter</button>
          </form>
        </div>
      </div>
    </section>
  </body>
  <script>
    const modalContainer = document.querySelector(".modal-container");
    const modalTriggers = document.querySelectorAll(".modal-trigger");

    modalTriggers.forEach((trigger) =>
      trigger.addEventListener("click", toggleModal),
    );

    function toggleModal() {
      modalContainer.classList.toggle("active");
    }
  </script>
